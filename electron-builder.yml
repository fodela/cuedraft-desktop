appId: com.cuedraft.desktop
productName: CueDraft
directories:
  output: dist
  buildResources: assets
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources:
  - assets/*
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/@jitsi/robotjs/**"

publish:
  - provider: github
    owner: fodela
    repo: cuedraft-desktop

# ── Windows ──────────────────────────────────────────────
win:
  target: nsis
  icon: assets/logo.png
  artifactName: "CueDraft-windows.exe"
  # Code signing — uncomment once you have a certificate.
  # Options: DigiCert (.p12 via WIN_CSC_LINK env var) or Azure Trusted Signing.
  # signingHashAlgorithms:
  #   - sha256
  # publisherName: "Your Name or Company"   # must match the certificate CN
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# ── Linux ────────────────────────────────────────────────
linux:
  target:
    - deb
    - AppImage
  icon: assets/logo.png
  category: Utility
  artifactName: "CueDraft-linux.${ext}"
  executableName: cuedraft
deb:
  depends:
    - libxtst6

# ── macOS ────────────────────────────────────────────────
mac:
  target:
    - dmg       # drag-to-Applications disk image (most common)
    - zip       # plain zip for auto-updater / manual install
  icon: assets/logo.png
  # Required so robotjs can inject keystrokes via the Accessibility API
  extendInfo:
    NSAccessibilityUsageDescription: >
      CueDraft needs Accessibility access to type text into other apps.
  # Code signing & notarization — uncomment once you have an Apple Developer account.
  # identity: "Developer ID Application: Your Name (TEAMID)"
  # notarize:
  #   teamId: ${APPLE_TEAM_ID}    # reads from env var set in CI secrets
dmg:
  title: "${productName} ${version}"
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
