appId: com.cuedraft.desktop
productName: CueDraft
directories:
  output: dist
  buildResources: assets
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources:
  - assets/*
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/@jitsi/robotjs/**"
win:
  target: nsis
  icon: assets/tray-icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
linux:
  target:
    - deb
    - AppImage
  icon: assets/tray-icon.png
  category: Utility
  desktop:
    Exec: "env ELECTRON_OZONE_PLATFORM_HINT=x11 /opt/cuedraft/cuedraft %U"
    StartupNotify: "false"
deb:
  depends:
    - libxtst6
