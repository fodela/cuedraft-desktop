appId: com.cuedraft.desktop
productName: CueDraft
directories:
  output: dist
  buildResources: assets
files:
  - out/**/*
  - "!node_modules/**/*"
extraResources:
  - assets/*
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/@jitsi/robotjs/**"

# ── Windows ──────────────────────────────────────────────
win:
  target: nsis
  icon: assets/tray-icon.ico
  artifactName: "CueDraft-windows.exe"
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

# ── Linux ────────────────────────────────────────────────
linux:
  target:
    - deb
    - AppImage
  icon: assets/tray-icon.png
  category: Utility
  artifactName: "CueDraft-linux.${ext}"
  desktop:
    entry:
      Exec: "env ELECTRON_OZONE_PLATFORM_HINT=x11 /opt/cuedraft/cuedraft %U"
      StartupNotify: "false"
deb:
  depends:
    - libxtst6

# ── macOS ────────────────────────────────────────────────
mac:
  target:
    - dmg       # drag-to-Applications disk image (most common)
    - zip       # plain zip for auto-updater / manual install
  icon: assets/tray-icon.icns
  # Required so robotjs can inject keystrokes via the Accessibility API
  extendInfo:
    NSAccessibilityUsageDescription: >
      CueDraft needs Accessibility access to type text into other apps.
  # Uncomment and fill in once you have an Apple Developer account:
  # identity: "Developer ID Application: Your Name (TEAMID)"
  # notarize: true
dmg:
  title: "${productName} ${version}"
  background: assets/dmg-background.png   # optional, 540×380 px PNG
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
