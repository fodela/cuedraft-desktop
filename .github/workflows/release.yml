name: Release

on:
  push:
    tags:
      - "v*"           # trigger on version tags, e.g. v1.0.0
  workflow_dispatch:   # allow manual runs

permissions:
  contents: write      # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
            artifact: |
              dist/*.exe
          - os: ubuntu-latest
            script: dist:linux
            artifact: |
              dist/*.deb
              dist/*.AppImage
          - os: macos-latest
            script: dist:mac
            artifact: |
              dist/*.dmg
              dist/*.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install linux system deps for robotjs / better-sqlite3 builds
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libxtst-dev libpng-dev

      - name: Install dependencies
        run: npm install

      # macOS: rebuild native modules against the Electron headers
      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3 --only better-sqlite3

      - name: Build & package
        run: npm run ${{ matrix.script }}
        env:
          # Provide these secrets in GitHub repo settings for signed macOS builds
          # CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cuedraft-${{ matrix.os }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
