name: Release

on:
  push:
    tags:
      - "v*"           # trigger on version tags, e.g. v1.0.0
  workflow_dispatch:   # allow manual runs

permissions:
  contents: write      # needed to upload release assets

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux
          - os: macos-latest
            platform: mac

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Install linux system deps for robotjs / better-sqlite3 builds
      - name: Install Linux build deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get install -y libxtst-dev libpng-dev

      - name: Install dependencies
        run: npm install

      - name: Rebuild native modules
        run: npx electron-rebuild -f -w better-sqlite3 --only better-sqlite3

      - name: Run tests
        run: npm test

      - name: Build & package
        shell: bash
        run: |
          npm run build
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            npx electron-builder --${{ matrix.platform }} --publish always
          else
            npx electron-builder --${{ matrix.platform }} --publish never
          fi
        env:
          # ── macOS code signing & notarization ──────────────────────────
          # Uncomment once you have an Apple Developer account.
          # Add each as a secret in GitHub → Settings → Secrets → Actions.
          # CSC_LINK: ${{ secrets.APPLE_CERTIFICATE }}          # base64-encoded .p12
          # CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          # APPLE_ID: ${{ secrets.APPLE_ID }}
          # APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          # APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # ── Windows code signing ────────────────────────────────────────
          # Uncomment once you have a Windows certificate (DigiCert / Azure Trusted Signing).
          # WIN_CSC_LINK: ${{ secrets.WIN_CERTIFICATE }}        # base64-encoded .p12
          # WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CERTIFICATE_PASSWORD }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Runs after all three build jobs succeed; converts the draft release
  # (created by release-it) to a published release.
  publish:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: softprops/action-gh-release@v2
        with:
          draft: false
